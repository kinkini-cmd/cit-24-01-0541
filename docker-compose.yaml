version: "3"

services:

  web:
    build: .
    container_name: task-web
    ports:
      - "5000:5000"
    depends_on:
      - db


  db:
    image: postgres:16
    container_name: task-db

    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - task_data:/var/lib/postgresql/data


volumes:
  task_data:
